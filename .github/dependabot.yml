# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Weekly version updates for anything in Cargo.toml that comes from crates.io.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  # Weekly updates for pinned actions in .github/workflows (e.g. actions/checkout@v3 vs @v4, auguwu/clippy-action@1.3.0).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
