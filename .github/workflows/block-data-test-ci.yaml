name: Demo Block Data Feature

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  block-data-demo:
    runs-on: ubuntu-latest
    env:
      TX_TOOL_DOCKER_ARGS: >-
        --network zcash-net
        -e ZCASH_NODE_ADDRESS=zebra-node
        -e ZCASH_NODE_PORT=18232
        -e ZCASH_NODE_PROTOCOL=http
        -v wallet-data:/app

    steps:
      - name: Checkout tx-tool code
        uses: actions/checkout@v3
        with:
          path: tx-tool

      - name: Checkout Zebra code
        uses: actions/checkout@v3
        with:
          repository: QED-it/zebra
          ref: ${{ vars.ZEBRA_BRANCH_TO_TEST || 'zsa-integration-demo' }} # The branch in Zebra we want to test against
          path: zebra

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set up Docker cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: zebra-cache-${{ runner.os }}-${{ hashFiles('zebra/testnet-single-node-deploy/dockerfile') }}
          restore-keys: |
            zebra-cache-${{ runner.os }}-
            zebra-cache-

      - name: Build Zebra Node
        uses: docker/build-push-action@v4
        with:
          context: zebra
          file: zebra/testnet-single-node-deploy/dockerfile
          tags: zebra-node:local
          push: false
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Build tx-tool
        uses: docker/build-push-action@v4
        with:
          context: tx-tool
          file: tx-tool/Dockerfile
          tags: zcash-tx-tool:local
          push: false
          load: true

      - name: Set up Docker infrastructure
        run: |
          docker rm -f zcash-tx-tool-run1 zcash-tx-tool-run2 zcash-tx-tool-run3 zebra-node 2>/dev/null || true
          docker network rm zcash-net 2>/dev/null || true
          docker volume rm wallet-data 2>/dev/null || true
          docker network create zcash-net
          docker volume create wallet-data
          docker run -d --name zebra-node --network zcash-net -p 18232:18232 zebra-node:local
          echo "Waiting for Zebra node to initialize..."
          sleep 15

      - name: "Run 1: First tx-tool run"
        run: |
          docker run $TX_TOOL_DOCKER_ARGS \
            --name zcash-tx-tool-run1 \
            zcash-tx-tool:local test-orchard-zsa 2>&1 | tee /tmp/run1.log

          EXIT_CODE=$(docker inspect zcash-tx-tool-run1 --format='{{.State.ExitCode}}')
          if [ $EXIT_CODE -ne 0 ]; then
            echo "First run failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "First run completed successfully"

          RUN1_BLOCK_DATA=$(docker run --rm $TX_TOOL_DOCKER_ARGS zcash-tx-tool:local get-block-data)
          echo "Block data after Run 1:"
          echo "$RUN1_BLOCK_DATA"
          RUN1_BLOCK_HEIGHT=$(jq -r 'if (.error == null and .block_height != null) then .block_height else empty end' <<< "$RUN1_BLOCK_DATA")
          if [ -z "$RUN1_BLOCK_HEIGHT" ]; then
            echo "Expected block data to exist after Run 1"
            exit 1
          fi
          echo "RUN1_BLOCK_HEIGHT=$RUN1_BLOCK_HEIGHT" >> "$GITHUB_ENV"

          echo ""
          echo "=========================================="
          echo "SYNC STATUS: After Run 1 (fresh start, no cached data)"
          echo "=========================================="
          echo "First stored block:"
          docker run --rm $TX_TOOL_DOCKER_ARGS zcash-tx-tool:local get-block-data 0
          echo ""
          echo "Last stored block:"
          docker run --rm $TX_TOOL_DOCKER_ARGS zcash-tx-tool:local get-block-data
          echo "=========================================="

      - name: "Run 2: Second tx-tool run (block data reuse)"
        run: |
          docker rm zcash-tx-tool-run1

          PRE_RUN2_BLOCK_DATA=$(docker run --rm $TX_TOOL_DOCKER_ARGS zcash-tx-tool:local get-block-data)
          echo "Block data before Run 2:"
          echo "$PRE_RUN2_BLOCK_DATA"
          PRE_RUN2_BLOCK_HEIGHT=$(jq -r 'if (.error == null and .block_height != null) then .block_height else empty end' <<< "$PRE_RUN2_BLOCK_DATA")
          if [ -z "$PRE_RUN2_BLOCK_HEIGHT" ]; then
            echo "Expected block data from Run 1 to persist before Run 2"
            exit 1
          fi
          if [ "$PRE_RUN2_BLOCK_HEIGHT" -ne "$RUN1_BLOCK_HEIGHT" ]; then
            echo "Expected persisted block height before Run 2 to equal Run 1 height ($RUN1_BLOCK_HEIGHT), got $PRE_RUN2_BLOCK_HEIGHT"
            exit 1
          fi

          docker run $TX_TOOL_DOCKER_ARGS \
            --name zcash-tx-tool-run2 \
            zcash-tx-tool:local test-orchard-zsa 2>&1 | tee /tmp/run2.log

          EXIT_CODE=$(docker inspect zcash-tx-tool-run2 --format='{{.State.ExitCode}}')
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Second run failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Second run completed successfully"

          RUN2_BLOCK_DATA=$(docker run --rm $TX_TOOL_DOCKER_ARGS zcash-tx-tool:local get-block-data)
          echo "Block data after Run 2:"
          echo "$RUN2_BLOCK_DATA"
          RUN2_BLOCK_HEIGHT=$(jq -r 'if (.error == null and .block_height != null) then .block_height else empty end' <<< "$RUN2_BLOCK_DATA")
          if [ -z "$RUN2_BLOCK_HEIGHT" ]; then
            echo "Expected block data to exist after Run 2"
            exit 1
          fi
          if [ "$RUN2_BLOCK_HEIGHT" -lt "$RUN1_BLOCK_HEIGHT" ]; then
            echo "Expected Run 2 block height to be >= Run 1 height ($RUN1_BLOCK_HEIGHT), got $RUN2_BLOCK_HEIGHT"
            exit 1
          fi
          echo "RUN2_BLOCK_HEIGHT=$RUN2_BLOCK_HEIGHT" >> "$GITHUB_ENV"

          echo ""
          echo "=========================================="
          echo "SYNC STATUS: After Run 2 (reusing cached block data)"
          echo "=========================================="
          echo "First stored block:"
          docker run --rm $TX_TOOL_DOCKER_ARGS zcash-tx-tool:local get-block-data 0
          echo ""
          echo "Last stored block:"
          docker run --rm $TX_TOOL_DOCKER_ARGS zcash-tx-tool:local get-block-data
          echo "=========================================="

      - name: Restart Zebra Node
        run: |
          docker stop zebra-node
          docker rm zebra-node
          docker run -d --name zebra-node --network zcash-net -p 18232:18232 zebra-node:local
          echo "Waiting for Zebra node to reinitialize..."
          sleep 30
          ZEBRA_READY=false
          for i in {1..10}; do
            RESPONSE=$(curl -sS \
              -H 'content-type: text/plain;' \
              --data-binary '{"jsonrpc":"1.0","id":"ci","method":"getblockchaininfo","params":[]}' \
              http://127.0.0.1:18232/ || true)
            if jq -e '.result != null' <<< "$RESPONSE" > /dev/null; then
              echo "Zebra node is ready!"
              ZEBRA_READY=true
              break
            fi
            echo "Waiting for Zebra node... (attempt $i/10)"
            sleep 10
          done
          if [ "$ZEBRA_READY" != "true" ]; then
            echo "Zebra node did not become ready in time"
            echo "Last getblockchaininfo response:"
            echo "$RESPONSE"
            exit 1
          fi

      - name: "Run 3: Third tx-tool run (after Zebra restart)"
        run: |
          docker rm zcash-tx-tool-run2

          PRE_RUN3_BLOCK_DATA=$(docker run --rm $TX_TOOL_DOCKER_ARGS zcash-tx-tool:local get-block-data)
          echo "Block data before Run 3:"
          echo "$PRE_RUN3_BLOCK_DATA"
          PRE_RUN3_BLOCK_HEIGHT=$(jq -r 'if (.error == null and .block_height != null) then .block_height else empty end' <<< "$PRE_RUN3_BLOCK_DATA")
          if [ -z "$PRE_RUN3_BLOCK_HEIGHT" ]; then
            echo "Expected block data from Run 2 to persist before Run 3"
            exit 1
          fi
          if [ "$PRE_RUN3_BLOCK_HEIGHT" -ne "$RUN2_BLOCK_HEIGHT" ]; then
            echo "Expected persisted block height before Run 3 to equal Run 2 height ($RUN2_BLOCK_HEIGHT), got $PRE_RUN3_BLOCK_HEIGHT"
            exit 1
          fi

          docker run $TX_TOOL_DOCKER_ARGS \
            --name zcash-tx-tool-run3 \
            zcash-tx-tool:local test-orchard-zsa 2>&1 | tee /tmp/run3.log

          EXIT_CODE=$(docker inspect zcash-tx-tool-run3 --format='{{.State.ExitCode}}')
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Third run failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Third run completed successfully"

          RUN3_BLOCK_DATA=$(docker run --rm $TX_TOOL_DOCKER_ARGS zcash-tx-tool:local get-block-data)
          echo "Block data after Run 3:"
          echo "$RUN3_BLOCK_DATA"
          RUN3_BLOCK_HEIGHT=$(jq -r 'if (.error == null and .block_height != null) then .block_height else empty end' <<< "$RUN3_BLOCK_DATA")
          if [ -z "$RUN3_BLOCK_HEIGHT" ]; then
            echo "Expected block data to exist after Run 3"
            exit 1
          fi
          if [ "$RUN3_BLOCK_HEIGHT" -lt 1 ]; then
            echo "Expected Run 3 to sync and store blocks on the restarted Zebra chain, got height $RUN3_BLOCK_HEIGHT"
            exit 1
          fi

          echo ""
          echo "=========================================="
          echo "SYNC STATUS: After Run 3 (validated persisted block data after Zebra restart)"
          echo "=========================================="
          echo "First stored block:"
          docker run --rm $TX_TOOL_DOCKER_ARGS zcash-tx-tool:local get-block-data 0
          echo ""
          echo "Last stored block:"
          docker run --rm $TX_TOOL_DOCKER_ARGS zcash-tx-tool:local get-block-data
          echo "=========================================="

      - name: "Run 4: test-three-party (covers zebra-test-ci coverage)"
        run: |
          docker rm zcash-tx-tool-run3
          docker run $TX_TOOL_DOCKER_ARGS \
            --name zcash-tx-tool-run4 \
            zcash-tx-tool:local test-three-party 2>&1 | tee /tmp/run4.log

          EXIT_CODE=$(docker inspect zcash-tx-tool-run4 --format='{{.State.ExitCode}}')
          if [ $EXIT_CODE -ne 0 ]; then
            echo "test-three-party run failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "test-three-party run completed successfully"

      - name: Print Zebra logs
        if: always()
        run: docker logs zebra-node || echo "Could not retrieve Zebra logs"

      - name: Cleanup
        if: always()
        run: |
          docker rm zcash-tx-tool-run1 zcash-tx-tool-run2 zcash-tx-tool-run3 zcash-tx-tool-run4 || true
          docker stop zebra-node || true
          docker rm zebra-node || true
          docker network rm zcash-net || true
          docker volume rm wallet-data || true
