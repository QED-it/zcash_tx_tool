name: Demo Block Data Feature

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  block-data-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space (safe cleanup for Rust CI)
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache || true
          df -h

      - name: Checkout tx-tool code
        uses: actions/checkout@v3
        with:
          path: tx-tool

      - name: Checkout Zebra code
        uses: actions/checkout@v3
        with:
          repository: QED-it/zebra
          ref: ${{ vars.ZEBRA_BRANCH_TO_TEST || 'zsa-integration-demo' }}
          path: zebra

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set up Docker cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: zebra-cache-${{ runner.os }}-${{ hashFiles('zebra/testnet-single-node-deploy/dockerfile') }}
          restore-keys: |
            zebra-cache-${{ runner.os }}-
            zebra-cache-

      - name: Build Zebra Node
        uses: docker/build-push-action@v4
        with:
          context: zebra
          file: zebra/testnet-single-node-deploy/dockerfile
          tags: zebra-node:local
          push: false
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Run Zebra Node container
        run: |
          docker run -d --name zebra-node -p 18232:18232 zebra-node:local
          echo "Waiting for Zebra node to initialize..."
          sleep 15
          echo "Finished waiting for Zebra node..."

      - name: Build tx-tool
        uses: docker/build-push-action@v4
        with:
          context: tx-tool
          file: tx-tool/Dockerfile
          tags: zcash-tx-tool:local
          push: false
          load: true

      - name: Create Docker network
        run: |
          docker network create zcash-net
          docker network connect zcash-net zebra-node

      - name: Create shared volume for wallet database
        run: |
          docker volume create wallet-data

      - name: "Run 1: First tx-tool run"
        run: |
          echo "=========================================="
          echo "FIRST RUN"
          echo "=========================================="
          
          docker run --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/app \
            --name zcash-tx-tool-run1 \
            zcash-tx-tool:local test-orchard-zsa 2>&1 | tee /tmp/run1.log
          
          EXIT_CODE=$(docker inspect zcash-tx-tool-run1 --format='{{.State.ExitCode}}')
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "First run failed with exit code $EXIT_CODE"
            exit 1
          fi
          
          echo ""
          echo "First run completed successfully"

      - name: "Display block data storage contents after first run"
        run: |
          echo "=========================================="
          echo "BLOCK DATA STORAGE CONTENTS (After Run 1)"
          echo "=========================================="
          
          echo ""
          echo "Block 0 (first block):"
          docker run --rm --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/app \
            zcash-tx-tool:local get-block-data 0
          
          echo ""
          echo "Last block in storage:"
          docker run --rm --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/app \
            zcash-tx-tool:local get-block-data

      - name: "Run 2: Second tx-tool run"
        run: |
          echo "=========================================="
          echo "SECOND RUN"
          echo "=========================================="
          
          docker rm zcash-tx-tool-run1
          
          docker run --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/app \
            --name zcash-tx-tool-run2 \
            zcash-tx-tool:local test-orchard-zsa 2>&1 | tee /tmp/run2.log
          
          EXIT_CODE=$(docker inspect zcash-tx-tool-run2 --format='{{.State.ExitCode}}')
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Second run failed with exit code $EXIT_CODE"
            exit 1
          fi
          
          echo ""
          echo "Second run completed successfully"

      - name: "Display block data storage contents after second run"
        run: |
          echo "=========================================="
          echo "BLOCK DATA STORAGE CONTENTS (After Run 2)"
          echo "=========================================="

          echo ""
          echo "Block 0 (first block):"
          docker run --rm --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/app \
            zcash-tx-tool:local get-block-data 0

          echo ""
          echo "Last block in storage:"
          docker run --rm --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/app \
            zcash-tx-tool:local get-block-data

      - name: "Restart Zebra Node (clear block data)"
        run: |
          echo "=========================================="
          echo "RESTARTING ZEBRA NODE"
          echo "=========================================="

          echo "Stopping Zebra node..."
          docker stop zebra-node

          echo "Removing old Zebra container..."
          docker rm zebra-node

          echo "Starting fresh Zebra node..."
          docker run -d --name zebra-node -p 18232:18232 zebra-node:local

          echo "Connecting to network..."
          docker network connect zcash-net zebra-node

          echo "Waiting for Zebra node to reinitialize..."
          sleep 15
          echo "Zebra node restarted successfully"

      - name: "Run 3: Third tx-tool run (after Zebra restart)"
        run: |
          echo "=========================================="
          echo "THIRD RUN (After Zebra Restart)"
          echo "=========================================="

          docker rm zcash-tx-tool-run2

          docker run --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/app \
            --name zcash-tx-tool-run3 \
            zcash-tx-tool:local test-orchard-zsa 2>&1 | tee /tmp/run3.log

          EXIT_CODE=$(docker inspect zcash-tx-tool-run3 --format='{{.State.ExitCode}}')

          if [ $EXIT_CODE -ne 0 ]; then
            echo "Third run failed with exit code $EXIT_CODE"
            exit 1
          fi

          echo ""
          echo "Third run completed successfully"

      - name: "Display block data storage contents after third run"
        run: |
          echo "=========================================="
          echo "BLOCK DATA STORAGE CONTENTS (After Run 3 - Zebra Restart)"
          echo "=========================================="

          echo ""
          echo "Block 0 (first block):"
          docker run --rm --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/app \
            zcash-tx-tool:local get-block-data 0

          echo ""
          echo "Last block in storage:"
          docker run --rm --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/app \
            zcash-tx-tool:local get-block-data

      - name: Print Zebra logs
        if: always()
        run: |
          echo "Printing Zebra node logs:"
          docker logs zebra-node || echo "Could not retrieve Zebra logs"

      - name: Cleanup
        if: always()
        run: |
          docker rm zcash-tx-tool-run1 || true
          docker rm zcash-tx-tool-run2 || true
          docker rm zcash-tx-tool-run3 || true
          docker stop zebra-node || true
          docker rm zebra-node || true
          docker network rm zcash-net || true
          docker volume rm wallet-data || true

