name: Auto-close failed Dependabot PRs

on:
  workflow_run:
    workflows:
      - "Rust"
      - "Lints"
      - "Demo Block Data Feature"
      - "Check tx-tool against Zebra"
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  close-on-failure:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0] != null
    steps:
      - name: Check if PR is from Dependabot
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.workflow_run.pull_requests[0].number }}
          PR_AUTHOR=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json author -q '.author.login')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "is_dependabot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_dependabot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Close Dependabot PR
        if: steps.check.outputs.is_dependabot == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.check.outputs.pr_number }}
        run: |
          gh pr close "$PR_NUMBER" --repo "${{ github.repository }}" \
            --comment "Closing: **${{ github.event.workflow_run.name }}** failed. This dependency update may introduce breaking changes."
