name: Lints

# We only run these lints on trial-merges of PRs to reduce noise.
on: pull_request

jobs:

  fmt:
    name: Rustfmt
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo fmt -- --check

  clippy:
    name: Clippy (MSRV)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: '--cfg zcash_unstable="nu7"'
    steps:
      - uses: actions/checkout@v6
      - name: Run Clippy
        uses: auguwu/clippy-action@1.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: .
          deny: warnings
