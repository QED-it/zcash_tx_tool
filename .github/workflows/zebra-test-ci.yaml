# CI Workflow to test tx-tool against a locally built Zebra node.
# This workflow clones the zebra repo at a specific commit, builds the Zebra Docker image, and tests tx-tool against it.
# The workflow ensures tx-tool works correctly by spinning up a Zebra container
# and running the tx-tool from the current branch against it in a Docker network.
# Triggers: push to main, pull requests, and manual runs via workflow_dispatch.
# Please note that the selected Zebra commit should be a commit containing the testnet-single-node-deploy directory with a "dockerfile" and "regtest-config.toml" file in it.

name: Check tx-tool against Zebra

on:
  push:
  pull_request:
  workflow_dispatch:

# Within a single event type, cancel older in-progress runs for the same branch
# (e.g. successive pushes). event_name is part of the group so push runs aren't
# cancelled by pull_request runs (which are skipped via the job's `if` anyway).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # For a same-repo push, both `push` and `pull_request` events fire for the
    # same commit. Skip the `pull_request` run in that case (the `push` covers it).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    env:
      # The Zebra commit we test against. Update this to bump the pinned Zebra version.
      # Latest from branch: https://github.com/QED-it/zebra/tree/zsa-integration-demo
      ZEBRA_COMMIT: ${{ vars.ZEBRA_COMMIT_TO_TEST || 'e9710632479fd449d00097a4817dc3d93dcdf0fe' }}
      # Host-side URL for talking to the Zebra container's JSON-RPC port.
      ZEBRA_RPC_URL: http://127.0.0.1:18232/

    steps:
      - name: Free disk space (safe cleanup for Rust CI)
        run: |
          # Remove heavy preinstalled SDKs and toolchains
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache || true
          df -h

      - name: Checkout tx-tool code
        uses: actions/checkout@v6
        with:
          path: tx-tool

      - name: Checkout Zebra code
        uses: actions/checkout@v6
        with:
          repository: QED-it/zebra
          ref: ${{ env.ZEBRA_COMMIT }}
          path: zebra


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Cache the *built* zebra-node image as a tar, keyed by the Zebra commit.
      # On hit we skip the docker build entirely; on miss we build and save the
      # tar so the next run can hit. One key = one cached image; old commits'
      # caches go stale and are evicted by GitHub's normal LRU policy.
      - name: Cache Zebra docker image
        id: zebra-image-cache
        uses: actions/cache@v3
        with:
          path: /tmp/zebra-node.tar
          key: zebra-image-${{ env.ZEBRA_COMMIT }}

      - name: Load cached Zebra image
        if: steps.zebra-image-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/zebra-node.tar

      - name: Build Zebra Node
        if: steps.zebra-image-cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v7
        with:
          context: zebra
          file: zebra/testnet-single-node-deploy/dockerfile
          tags: zebra-node:local
          push: false
          load: true

      - name: Save Zebra image for cache
        if: steps.zebra-image-cache.outputs.cache-hit != 'true'
        run: docker save zebra-node:local -o /tmp/zebra-node.tar

      - name: Run Zebra Node container
        run: |
          docker run -d --name zebra-node -p 18232:18232 zebra-node:local
          # Wait for the node to start up
          echo "Waiting for Zebra node to initialize..."
          sleep 15
          echo "Finished waiting for Zebra node..."

      - name: Build tx-tool
        uses: docker/build-push-action@v7
        with:
          context: tx-tool
          file: tx-tool/Dockerfile
          tags: zcash-tx-tool:local
          push: false
          load: true

      - name: Run tx-tool for test-orchard-zsa and verify success
        run: |
          # Create a network to connect the containers
          docker network create zcash-net

          # Connect zebra-node to the network
          docker network connect zcash-net zebra-node

          # Persistent volume so block_data / wallet_state survive between runs
          docker volume create wallet-data

          # Run the tx tool and capture exit code
          docker run --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/data \
            --name zcash-tx-tool \
            zcash-tx-tool:local test-orchard-zsa
          
          # Get the exit code from the container
          EXIT_CODE=$(docker inspect zcash-tx-tool --format='{{.State.ExitCode}}')

          # Clean up
          docker rm zcash-tx-tool

          # Check if the tx_tool succeeded
          if [ $EXIT_CODE -ne 0 ]; then
            echo "tx-tool failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "tx-tool completed successfully!"

          # Persistence test, part 1: under a fixed seed, issue an asset and exit.
          # Part 2 (next step) recreates the wallet with the same seed and must
          # spend this note — that succeeds only if wallet_state, notes, and the
          # commitment-tree marked positions all survive the process restart.
          docker run --rm --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/data \
            zcash-tx-tool:local test-persistence-part1
          echo "test-persistence-part1 completed successfully!"
    
      - name: Verify block_data + wallet state persisted from run 1 and match Zebra chain
        run: |
          # Persistence test, part 2: same fixed seed as part 1. Must reload the
          # persisted wallet state and successfully transfer the asset issued in
          # part 1 — a successful mine here proves end-to-end persistence.
          docker run --rm --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/data \
            zcash-tx-tool:local test-persistence-part2
          echo "test-persistence-part2 completed successfully!"

          # 3-way head agreement: wallet_state, block_data tip, and Zebra agree on the same hash.
          sql() { docker run --rm -v wallet-data:/data --entrypoint sqlite3 zcash-tx-tool:local /data/walletdb.sqlite "$1"; }
          ZEBRA_TIP_HASH=$(curl -sS -H 'content-type: text/plain;' \
            --data-binary '{"jsonrpc":"1.0","id":"ci","method":"getbestblockhash","params":[]}' \
            "$ZEBRA_RPC_URL" | jq -r '.result // empty')
          OK=$(sql "SELECT
            ws.last_block_hash = '$ZEBRA_TIP_HASH'
            AND bd.hash = ws.last_block_hash
            AND bd.height = (SELECT MAX(height) FROM block_data)
          FROM wallet_state ws
          JOIN block_data bd ON bd.height = ws.last_block_height")
          [ "$OK" = "1" ] || { echo "consistency check failed: wallet_state, block_data, and Zebra tip do not all agree"; exit 1; }
          echo "Verified: wallet_state, block_data, and Zebra all agree at the chain tip"

      - name: Verify reorg detection wipes block_data and resyncs to chain tip
        run: |
          sql() { docker run --rm -v wallet-data:/data --entrypoint sqlite3 zcash-tx-tool:local /data/walletdb.sqlite "$1"; }

          # Simulate a chain fork by corrupting the stored hash at the head.
          # Next sync's head_matches_chain() must detect mismatch and call reset_full().
          HEAD=$(sql "SELECT MAX(height) FROM block_data")
          sql "UPDATE block_data SET hash = 'deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef' WHERE height = $HEAD"

          # Any sync-triggering command exercises the check; test-issue-one is the cheapest.
          docker run --rm --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node -e ZCASH_NODE_PORT=18232 -e ZCASH_NODE_PROTOCOL=http \
            -v wallet-data:/data \
            zcash-tx-tool:local test-issue-one

          # After reset_full + resync, two cross-checks against Zebra:
          # 1) the once-corrupted height now stores the real hash (proves the deadbeef was wiped);
          # 2) the cached tip matches Zebra's current best block (proves the resync reached the tip).
          ZEBRA_HEAD_HASH=$(curl -sS -H 'content-type: text/plain;' \
            --data-binary "{\"jsonrpc\":\"1.0\",\"id\":\"ci\",\"method\":\"getblockhash\",\"params\":[$HEAD]}" \
            "$ZEBRA_RPC_URL" | jq -r '.result // empty')
          ZEBRA_TIP_HASH=$(curl -sS -H 'content-type: text/plain;' \
            --data-binary '{"jsonrpc":"1.0","id":"ci","method":"getbestblockhash","params":[]}' \
            "$ZEBRA_RPC_URL" | jq -r '.result // empty')
          OK=$(sql "SELECT
            (SELECT hash FROM block_data WHERE height = $HEAD) = '$ZEBRA_HEAD_HASH'
            AND (SELECT hash FROM block_data ORDER BY height DESC LIMIT 1) = '$ZEBRA_TIP_HASH'")
          [ "$OK" = "1" ] || { echo "reorg detection failed: corrupted hash not replaced or tip not at chain head"; exit 1; }

          echo "Reorg detection verified: corrupted hash replaced and resynced to chain tip"

      - name: Run tx-tool again for test-three-party and verify success
        run: |                
          # Run the tx tool and capture exit code
          docker run --network zcash-net \
            -e ZCASH_NODE_ADDRESS=zebra-node \
            -e ZCASH_NODE_PORT=18232 \
            -e ZCASH_NODE_PROTOCOL=http \
            --name zcash-tx-tool \
            zcash-tx-tool:local test-three-party
          
          # Get the exit code from the container
          EXIT_CODE=$(docker inspect zcash-tx-tool --format='{{.State.ExitCode}}')
          
          # Clean up
          docker rm zcash-tx-tool
          
          # Check if the tx_tool succeeded
          if [ $EXIT_CODE -eq 0 ]; then
            echo "tx-tool completed successfully!"        
            exit 0
          else
            echo "tx-tool failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Print Zebra logs
        if: always()
        run: |
          echo "Printing Zebra node logs:"
          docker logs zebra-node || echo "Could not retrieve Zebra logs"

      - name: Cleanup
        if: always()
        run: |
          docker stop zebra-node || true
          docker rm zebra-node || true
          docker network rm zcash-net || true
          docker volume rm wallet-data || true
